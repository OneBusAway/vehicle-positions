openapi: 3.1.0
info:
  title: Vehicle Positions API
  version: 0.1.0
  summary: Realtime vehicle position tracking for transit agencies without AVL hardware.
  description: |
    The Vehicle Positions server ingests GPS reports from driver Android apps
    and serves a standards-compliant GTFS-RT Vehicle Positions feed. It is
    built for transit agencies in developing countries that have a GTFS static
    feed and a fleet of Android phones but no AVL infrastructure.

    This document describes every HTTP endpoint currently registered in
    `main.go`. Schemas, validation rules, and status codes are derived
    directly from the handler source — see `openapi_test.go`, which asserts
    that the spec and the code cannot drift apart.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: auth
    description: Driver authentication.
  - name: locations
    description: GPS location ingest.
  - name: feed
    description: GTFS-RT feed consumption.
  - name: health
    description: Liveness and readiness probes.
  - name: admin
    description: Administrative management endpoints.
  - name: trips
    description: Driver trip lifecycle.

# All endpoints require a bearer JWT unless they explicitly opt out with `security: []`.
security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Log in with email and password
      description: |
        Exchanges an email and password for a JWT bearer token valid for 24
        hours. The returned token must be supplied as
        `Authorization: Bearer <token>` on protected endpoints.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing or invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/locations:
    post:
      tags: [locations]
      summary: Submit a single location report
      description: |
        Records a GPS fix from a driver's device. The driver identity comes
        from the JWT `sub` claim, not the request body. Requests are
        rate-limited to one report per driver per 5 seconds; additional
        reports receive HTTP 429. Request bodies are capped at 1 MiB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationReport'
      responses:
        '201':
          description: Location accepted and persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Invalid JSON or payload validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          description: Rate limit exceeded for this driver.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /gtfs-rt/vehicle-positions:
    get:
      tags: [feed]
      summary: GTFS-RT Vehicle Positions feed
      description: |
        Returns a standards-compliant GTFS-RT `FeedMessage` containing every
        vehicle that has reported within the staleness threshold (default 5
        minutes). Defaults to protobuf; pass `?format=json` to receive the
        protojson-encoded form for debugging.
      security: []
      parameters:
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [json]
          description: When set to `json`, returns the protojson-encoded feed.
      responses:
        '200':
          description: GTFS-RT FeedMessage.
          content:
            application/x-protobuf:
              schema:
                type: string
                format: binary
                description: Serialized GTFS-RT `FeedMessage` protobuf.
            application/json:
              schema:
                type: object
                description: protojson-encoded GTFS-RT `FeedMessage`.
        '500':
          $ref: '#/components/responses/InternalError'

  /health:
    get:
      tags: [health]
      summary: Liveness probe
      description: Returns 200 if the process is serving requests.
      security: []
      responses:
        '200':
          description: Server is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: |
        Returns 200 if the server can reach the database within 2 seconds,
        or 503 if the database ping fails.
      security: []
      responses:
        '200':
          description: Server is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '503':
          description: Server is degraded (database unreachable).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/admin/status:
    get:
      tags: [admin]
      summary: System status and vehicle counts
      description: Requires the `admin` role.
      responses:
        '200':
          description: Current status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/vehicles:
    get:
      tags: [admin]
      summary: List all vehicles
      description: Requires the `admin` role.
      responses:
        '200':
          description: Vehicles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [admin]
      summary: Create or update a vehicle
      description: |
        Upserts by `id`. Requires the `admin` role. Request bodies are capped
        at 1 KiB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertVehicleRequest'
      responses:
        '200':
          description: Vehicle created or updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/vehicles/{id}:
    parameters:
      - $ref: '#/components/parameters/VehicleIDPath'
    get:
      tags: [admin]
      summary: Get a vehicle by id
      description: Requires the `admin` role.
      responses:
        '200':
          description: Vehicle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [admin]
      summary: Deactivate a vehicle
      description: |
        Sets `active = false`. The row is preserved so historical trips keep
        referencing it. Requires the `admin` role.
      responses:
        '204':
          description: Vehicle deactivated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/users:
    get:
      tags: [admin]
      summary: List all users
      description: |
        **Note:** unlike other `/api/v1/admin/*` endpoints, this currently
        only requires a valid bearer token — the admin-role check is
        missing from the handler. Tracked by PR #79, which adds
        `requireAdmin` to this route; when that merges, a `403` response
        will be added here.
      responses:
        '200':
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [admin]
      summary: Create a user
      description: |
        Request bodies are capped at 1 KiB.

        **Note:** unlike other `/api/v1/admin/*` endpoints, this currently
        only requires a valid bearer token — the admin-role check is
        missing from the handler. Tracked by PR #79, which adds
        `requireAdmin` to this route; when that merges, a `403` response
        will be added here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserIDPath'
    get:
      tags: [admin]
      summary: Get a user by id
      description: |
        **Note:** unlike other `/api/v1/admin/*` endpoints, this currently
        only requires a valid bearer token — the admin-role check is
        missing from the handler. Tracked by PR #79, which adds
        `requireAdmin` to this route; when that merges, a `403` response
        will be added here.
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [admin]
      summary: Update a user
      description: |
        Updates name, email, and role. Request bodies are capped at 1 KiB.

        **Note:** unlike other `/api/v1/admin/*` endpoints, this currently
        only requires a valid bearer token — the admin-role check is
        missing from the handler. Tracked by PR #79, which adds
        `requireAdmin` to this route; when that merges, a `403` response
        will be added here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [admin]
      summary: Delete a user
      description: |
        **Note:** unlike other `/api/v1/admin/*` endpoints, this currently
        only requires a valid bearer token — the admin-role check is
        missing from the handler. Tracked by PR #79, which adds
        `requireAdmin` to this route; when that merges, a `403` response
        will be added here.
      responses:
        '204':
          description: User deleted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/trips/start:
    post:
      tags: [trips]
      summary: Start a trip
      description: |
        Creates a new active trip for the authenticated driver. The driver
        must be assigned to the vehicle and must not already have an active
        trip. Request bodies are capped at 1 KiB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTripRequest'
      responses:
        '201':
          description: Trip started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Driver is not assigned to this vehicle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Driver already has an active trip.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/trips/end:
    post:
      tags: [trips]
      summary: End an active trip
      description: Request bodies are capped at 1 KiB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndTripRequest'
      responses:
        '200':
          description: Trip ended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No active trip matched the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token issued by `POST /api/v1/auth/login`. Signed HS256,
        24-hour TTL, `iss: vehicle-positions-api`.

  parameters:
    VehicleIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 50
        pattern: '^[a-zA-Z0-9._-]+$'
      description: Vehicle identifier.
    UserIDPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: User identifier.

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Caller lacks the required role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Request body exceeded the handler's size limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnsupportedMediaType:
      description: Content-Type must be `application/json`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message (matches the `writeJSON` helper).

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT bearer token (HS256, 24-hour TTL).

    LocationReport:
      type: object
      additionalProperties: false
      required: [vehicle_id, latitude, longitude, timestamp]
      properties:
        vehicle_id:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-zA-Z0-9._-]+$'
        trip_id:
          type: string
          description: Optional GTFS trip identifier the driver is currently operating.
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        bearing:
          type: [number, 'null']
          format: double
          minimum: 0
          maximum: 360
          description: Compass heading in degrees. May be null or omitted if unknown.
        speed:
          type: [number, 'null']
          format: double
          minimum: 0
          description: Ground speed in metres per second. May be null or omitted if unknown.
        accuracy:
          type: [number, 'null']
          format: double
          minimum: 0
          description: GPS horizontal accuracy in metres. May be null or omitted if unknown.
        timestamp:
          type: integer
          format: int64
          description: |
            Unix seconds. Must be within 5 minutes of the server clock;
            reports outside that window are rejected with 400.

    UpsertVehicleRequest:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-zA-Z0-9._-]+$'
        label:
          type: string
          maxLength: 255
        agency_tag:
          type: string
          maxLength: 255

    Vehicle:
      type: object
      required: [id, label, agency_tag, active, created_at, updated_at]
      properties:
        id:
          type: string
        label:
          type: string
        agency_tag:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        role:
          type: string
          enum: [driver, admin]

    UpdateUserRequest:
      type: object
      additionalProperties: false
      required: [name, email, role]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        role:
          type: string
          enum: [driver, admin]

    User:
      type: object
      required: [id, name, email, role, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [driver, admin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StartTripRequest:
      type: object
      additionalProperties: false
      required: [vehicle_id]
      properties:
        vehicle_id:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-zA-Z0-9._-]+$'
        route_id:
          type: string
          maxLength: 100
        gtfs_trip_id:
          type: string
          maxLength: 100

    EndTripRequest:
      type: object
      additionalProperties: false
      required: [trip_id]
      properties:
        trip_id:
          type: integer
          format: int64
          minimum: 1

    Trip:
      type: object
      required:
        - id
        - user_id
        - vehicle_id
        - route_id
        - gtfs_trip_id
        - start_time
        - status
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        vehicle_id:
          type: string
        route_id:
          type: string
        gtfs_trip_id:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
          description: |
            Present only on completed trips. The server omits this field
            while the trip is active (Go `*time.Time` with `omitempty`).
        status:
          type: string
          enum: [active, completed]

    AdminStatus:
      type: object
      required:
        - status
        - uptime_seconds
        - active_vehicles
        - total_vehicles_tracked
      properties:
        status:
          type: string
        uptime_seconds:
          type: integer
          format: int64
          minimum: 0
        active_vehicles:
          type: integer
          minimum: 0
        total_vehicles_tracked:
          type: integer
          minimum: 0
        last_update:
          type: string
          format: date-time
          description: |
            Timestamp of the most recent location report. Omitted when no
            vehicle has reported yet (Go `*time.Time` with `omitempty`).
